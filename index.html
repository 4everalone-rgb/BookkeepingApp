<meta name="apple-mobile-web-app-title" content="My Finances">
<title>My Finances</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html { font-size: 16px; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0a0a0f;
  color: #e0e0e8;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
.app-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10, 10, 15, 0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid #2a2a3a;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.app-logo {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  background: linear-gradient(135deg, #89CFF0 0%, #5DADE2 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
  flex-shrink: 0;
}
.app-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1.25rem;
  font-weight: 700;
  background: linear-gradient(135deg, #89CFF0 0%, #5DADE2 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.2;
}
.app-subtitle {
  font-size: 0.75rem;
  color: #6b6b7b;
  font-weight: 400;
}
.month-bar {
  position: sticky;
  top: 73px;
  z-index: 90;
  background: rgba(10, 10, 15, 0.9);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  padding: 8px 12px;
  display: flex;
  gap: 8px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  border-bottom: 1px solid #2a2a3a;
}
.month-bar::-webkit-scrollbar { display: none; }
.month-pill {
  flex-shrink: 0;
  padding: 8px 16px;
  border-radius: 20px;
  border: 1px solid #2a2a3a;
  background: #1a1a24;
  color: #8b8b9b;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.875rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
  white-space: nowrap;
}
.month-pill.active {

<script><script>
// ============================================================
// NUCLEAR-SAFE DATA LAYER
// ============================================================
var STORAGE_KEY = 'genericFinances2026_v2';
var MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

var DEFAULT_CONFIG = {
  appName: 'My Finances',
  banks: ['Absa', 'FNB'],
  salarySources: ['Primary Income', 'Side Income'],
  categories: ['Food & Dining', 'Transport', 'Groceries', 'Entertainment', 'Health & Fitness', 'Shopping', 'Bills & Utilities', 'Miscellaneous'],
  fixedExpenses: [
    { name: 'Netflix', amount: 99.99 },
    { name: 'Spotify', amount: 69.99 }
  ],
  budgets: {
    'Food & Dining': 500,
    'Transport': 300,
    'Groceries': 400,
    'Entertainment': 200,
    'Health & Fitness': 300,
    'Shopping': 300,
    'Bills & Utilities': 500,
    'Miscellaneous': 200,
    'Fixed Expenses': 170
  }
};

var appData = null;
var currentMonth = null;
var storageMode = 'localStorage'; // 'localStorage', 'sessionStorage', 'memory'
var memoryStore = null;

// --- STORAGE AVAILABILITY DETECTOR ---
function isStorageAvailable(type) {
  try {
    var storage = window[type];
    var x = '__storage_test__';
    storage.setItem(x, x);
    storage.removeItem(x);
    return true;
  } catch (e) {
    return false;
  }
}

function getStorage() {
  if (storageMode === 'localStorage' && isStorageAvailable('localStorage')) return localStorage;
  if (storageMode === 'sessionStorage' && isStorageAvailable('sessionStorage')) return sessionStorage;
  return null;
}

function storageGetItem(key) {
  var s = getStorage();
  if (s) {
    try { return s.getItem(key); } catch (e) { return null; }
  }
  if (memoryStore && memoryStore[key] !== undefined) {
    return memoryStore[key];
  }
  return null;
}

function storageSetItem(key, value) {
  var s = getStorage();
  if (s) {
    try {
      s.setItem(key, value);
      return true;
    } catch (e) {
      // Quota exceeded or private mode — fall back to memory
      storageMode = 'memory';
      if (!memoryStore) memoryStore = {};
      memoryStore[key] = value;
      showToast('Storage limited — using memory mode');
      return true;
    }
  }
  if (!memoryStore) memoryStore = {};
  memoryStore[key] = value;
  return true;
}

// --- DEFAULT DATA FACTORY ---
function createDefaultData() {
  var data = {
    config: deepClone(DEFAULT_CONFIG),
    months: {},
    version: 2
  };
  data.months['May'] = createMonthData('May', data.config);
  return data;
}

function createMonthData(monthName, config) {
  var month = {
    name: monthName,
    expenditures: {},
    salary: {},
    balances: { beginning: {}, ending: {} },
    budgets: deepClone(config.budgets || {})
  };
  var cats = config.categories || [];
  for (var i = 0; i < cats.length; i++) {
    month.expenditures[cats[i]] = [];
  }
  month.expenditures['Fixed Expenses'] = deepClone(config.fixedExpenses || []);
  var sources = config.salarySources || [];
  for (var j = 0; j < sources.length; j++) {
    month.salary[sources[j]] = '';
  }
  var banks = config.banks || [];
  for (var b = 0; b < banks.length; b++) {
    month.balances.beginning[banks[b]] = '';
    month.balances.ending[banks[b]] = '';
  }
  return month;
}

function deepClone(obj) {
  if (obj === null || typeof obj !== 'object') return obj;
  if (Array.isArray(obj)) {
    var arr = [];
    for (var i = 0; i < obj.length; i++) arr.push(deepClone(obj[i]));
    return arr;
  }
  var cloned = {};
  for (var k in obj) {
    if (obj.hasOwnProperty(k)) cloned[k] = deepClone(obj[k]);
  }
  return cloned;
}

// --- DATA VALIDATION & REPAIR (NUCLEAR) ---
function validateAndRepairData(data) {
  if (!data || typeof data !== 'object') return createDefaultData();
  if (!data.config || typeof data.config !== 'object') data.config = deepClone(DEFAULT_CONFIG);
  if (!data.months || typeof data.months !== 'object') data.months = {};

  var cfg = data.config;
  // Ensure config arrays exist
  if (!cfg.categories || !Array.isArray(cfg.categories) || cfg.categories.length === 0) {
    cfg.categories = deepClone(DEFAULT_CONFIG.categories);
  }
  if (!cfg.banks || !Array.isArray(cfg.banks) || cfg.banks.length === 0) {
    cfg.banks = deepClone(DEFAULT_CONFIG.banks);
  }
  if (!cfg.salarySources || !Array.isArray(cfg.salarySources) || cfg.salarySources.length === 0) {
    cfg.salarySources = deepClone(DEFAULT_CONFIG.salarySources);
  }
  if (!cfg.fixedExpenses || !Array.isArray(cfg.fixedExpenses)) {
    cfg.fixedExpenses = deepClone(DEFAULT_CONFIG.fixedExpenses);
  }
  if (!cfg.budgets || typeof cfg.budgets !== 'object') {
    cfg.budgets = deepClone(DEFAULT_CONFIG.budgets);
  }
  if (!cfg.appName || typeof cfg.appName !== 'string') {
    cfg.appName = DEFAULT_CONFIG.appName;
  }

  // Repair every month to match current config
  var monthKeys = Object.keys(data.months);
  if (monthKeys.length === 0) {
    data.months['May'] = createMonthData('May', cfg);
  } else {
    for (var m = 0; m < monthKeys.length; m++) {
      var mk = monthKeys[m];
      var month = data.months[mk];
      if (!month || typeof month !== 'object') {
        data.months[mk] = createMonthData(mk, cfg);
        continue;
      }
      if (!month.expenditures || typeof month.expenditures !== 'object') month.expenditures = {};
      if (!month.salary || typeof month.salary !== 'object') month.salary = {};
      if (!month.balances || typeof month.balances !== 'object') month.balances = { beginning: {}, ending: {} };
      if (!month.balances.beginning || typeof month.balances.beginning !== 'object') month.balances.beginning = {};
      if (!month.balances.ending || typeof month.balances.ending !== 'object') month.balances.ending = {};
      if (!month.budgets || typeof month.budgets !== 'object') month.budgets = {};

      // Ensure all categories have expenditure arrays
      for (var c = 0; c < cfg.categories.length; c++) {
        var cat = cfg.categories[c];
        if (!Array.isArray(month.expenditures[cat])) {
          month.expenditures[cat] = [];
        }
        if (month.budgets[cat] === undefined) {
          month.budgets[cat] = cfg.budgets[cat] || 0;
        }
      }
      // Ensure Fixed Expenses exists
      if (!Array.isArray(month.expenditures['Fixed Expenses'])) {
        month.expenditures['Fixed Expenses'] = deepClone(cfg.fixedExpenses || []);
      }
      if (month.budgets['Fixed Expenses'] === undefined) {
        month.budgets['Fixed Expenses'] = cfg.budgets['Fixed Expenses'] || 0;
      }

      // Ensure all salary sources exist
      for (var s = 0; s < cfg.salarySources.length; s++) {
        var src = cfg.salarySources[s];
        if (month.salary[src] === undefined) month.salary[src] = '';
      }

      // Ensure all banks exist in balances
      for (var b = 0; b < cfg.banks.length; b++) {
        var bank = cfg.banks[b];
        if (month.balances.beginning[bank] === undefined) month.balances.beginning[bank] = '';
        if (month.balances.ending[bank] === undefined) month.balances.ending[bank] = '';
      }
    }
  }

  return data;
}

function initData() {
  try {
    var saved = storageGetItem(STORAGE_KEY);
    if (saved) {
      var parsed = JSON.parse(saved);
      appData = validateAndRepairData(parsed);
    } else {
      appData = createDefaultData();
    }
  } catch (e) {
    console.error('Init error:', e);
    appData = createDefaultData();
  }
  // Ensure currentMonth is valid
  var keys = Object.keys(appData.months || {});
  if (!currentMonth || !appData.months[currentMonth]) {
    currentMonth = keys[0] || 'May';
  }
}

function saveData() {
  try {
    storageSetItem(STORAGE_KEY, JSON.stringify(appData));
  } catch (e) {
    showToast('Error saving data');
    console.error('Save error:', e);
  }
}

// ============================================================
// MONTH MANAGEMENT
// ============================================================
function addMonth() {
  var monthInput = prompt('Enter month name (e.g. January, February, March...):');
  if (!monthInput) return;
  var newMonth = monthInput.trim();
  newMonth = newMonth.charAt(0).toUpperCase() + newMonth.slice(1).toLowerCase();
  if (MONTH_NAMES.indexOf(newMonth) === -1) {
    showToast('Invalid month name. Use full month name like January, February, etc.');
    return;
  }
  if (appData.months[newMonth]) {
    showToast(newMonth + ' already exists');
    return;
  }
  appData.months[newMonth] = createMonthData(newMonth, appData.config);
  currentMonth = newMonth;
  saveData();
  renderMonthBar();
  renderMonth();
}

function switchMonth(month) {
  currentMonth = month;
  renderMonthBar();
  renderMonth();
  window.scrollTo(0, 0);
}

function sortMonthsChronologically(months) {
  var order = {};
  for (var i = 0; i < MONTH_NAMES.length; i++) {
    order[MONTH_NAMES[i]] = i;
  }
  return months.slice().sort(function(a, b) {
    return (order[a] || 0) - (order[b] || 0);
  });
}

// ============================================================
// UTILITIES
// ============================================================
function dateToSerial(dateStr) {
  if (!dateStr) return '';
  var d = new Date(dateStr);
  if (isNaN(d.getTime())) return '';
  var epoch = new Date(1899, 11, 30);
  var diff = d.getTime() - epoch.getTime();
  var days = diff / (1000 * 60 * 60 * 24);
  return Math.floor(days);
}

function serialToDateString(serial) {
  if (!serial && serial !== 0) return '';
  var epoch = new Date(1899, 11, 30);
  var d = new Date(epoch.getTime() + serial * 24 * 60 * 60 * 1000);
  var y = d.getFullYear();
  var m = String(d.getMonth() + 1).padStart(2, '0');
  var day = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + day;
}

function formatMoney(val) {
  if (val === '' || val === null || val === undefined || isNaN(val)) return '';
  var num = parseFloat(val);
  if (num === 0) return '0';
  return num.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
}

// ============================================================
// ESCAPE HELPERS (HTML-ATTRIBUTE SAFE)
// ============================================================
function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  str = String(str);
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function escapeJs(str) {
  if (str === null || str === undefined) return '';
  str = String(str);
  // For use inside HTML onclick="..." attributes where the outer quote is double
  // We need to escape backslashes, single quotes (used as JS string delimiters), and newlines
  return str.replace(/\/g, '\\').replace(/'/g, "\'").replace(/
/g, '\n').replace(/
/g, '\r');
}

function attrEscape(str) {
  // For use inside HTML attributes directly (not inside JS strings)
  if (str === null || str === undefined) return '';
  str = String(str);
  return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function renderMonthBar() {

    var html = '';

    for (var i = 0; i < months.length; i++) {

      html += '<button class="month-pill' + active + '" onclick="switchMonth(' + "'" + escapeJs(m) + "'" + ')">' + escapeHtml(m) + '</button>';
    }
    html += '<button class="month-pill add-btn" onclick="addMonth()">+ Month</button>';
    bar.innerHTML = html;
  } catch (e) {
    console.error('renderMonthBar error:', e);
  }
}

  try {
    if (!items || !Array.isArray(items)) items = [];
    var html = '<div class="section-card">';
    html += '<div class="card-header">';
    html += '<div class="inline-edit-wrap">';
    html += '<input type="text" class="card-title" value="' + attrEscape(cat) + '" onchange="renameCategory(' + catIndex + ', this.value)" />';
    html += '<button class="btn-inline" onclick="removeCategory(' + catIndex + ')">&#215;</button>';
    html += '</div>';
    html += '</div>';

    var total = 0;
    for (var j = 0; j < items.length; j++) {
      var entry = items[j] || {};
      var dateStr = serialToDateString(entry.date);
      html += '<div class="row-entry">';
      html += '<input type="text" class="row-input input-desc" value="' + attrEscape(entry.desc || '') + '" placeholder="Description" onchange="updateEntry(' + "'" + escapeJs(cat) + "'" + ',' + j + ',' + "'desc'" + ',this.value)">';
      html += '<input type="date" class="row-input input-date" value="' + attrEscape(dateStr) + '" onchange="updateEntry(' + "'" + escapeJs(cat) + "'" + ',' + j + ',' + "'date'" + ',this.value)">';

    }
    html += '<button class="btn-add" onclick="addEntry(' + "'" + escapeJs(cat) + "'" + ')">+ Add ' + escapeHtml(cat) + ' Entry</button>';

    html += '<div class="card-header" style="border-top:1px solid #2a2a3a;"><span class="card-title">Total</span><span class="card-total">' + formatMoney(total) + '</span></div>';

function renderSummaryTable(month, config) {
  try {
    var html = '<div class="section-card">';
    html += '<div class="card-header"><span class="card-title">Expenditure Summary</span></div>';
    html += '<table class="summary-table">';
    html += '<thead><tr><th>Category</th><th class="amount-cell">Amount</th><th class="budget-cell">Budgeted</th></tr></thead>';
    html += '<tbody>';

    var grandTotal = 0;
    var budgetTotal = 0;
    var cats = config.categories || [];

    for (var i = 0; i < cats.length; i++) {
      var cat = cats[i];
      var items = (month.expenditures && month.expenditures[cat]) || [];
      var actual = 0;
      for (var e = 0; e < items.length; e++) {
        actual += parseFloat(items[e].amount) || 0;
      }
      var budget = (month.budgets && month.budgets[cat] !== undefined) ? month.budgets[cat] : 0;
      grandTotal += actual;
      budgetTotal += parseFloat(budget) || 0;

      var diffClass = '';
      if (actual > budget && budget > 0) diffClass = ' over-budget';
      else if (actual <= budget && budget > 0) diffClass = ' under-budget';

      html += '<tr>';
      html += '<td>' + escapeHtml(cat) + '</td>';
      html += '<td class="amount-cell' + diffClass + '">' + formatMoney(actual) + '</td>';
      html += '<td class="budget-cell"><input type="text" inputmode="decimal" class="budget-input" value="' + attrEscape(budget !== undefined ? budget : '') + '" onchange="updateBudget(' + "'" + escapeJs(cat) + "'" + ',this.value)"></td>';
      html += '</tr>';
    }

    var fixedItems = (month.expenditures && month.expenditures['Fixed Expenses']) || [];
    var fixedTotal = 0;
    for (var f = 0; f < fixedItems.length; f++) {
      fixedTotal += parseFloat(fixedItems[f].amount) || 0;
    }
    grandTotal += fixedTotal;
    var fixedBudget = (month.budgets && month.budgets['Fixed Expenses'] !== undefined) ? month.budgets['Fixed Expenses'] : 0;
    budgetTotal += parseFloat(fixedBudget) || 0;

    html += '<tr>';
    html += '<td>Fixed Expenses</td>';
    html += '<td class="amount-cell">' + formatMoney(fixedTotal) + '</td>';
    html += '<td class="budget-cell"><input type="text" inputmode="decimal" class="budget-input" value="' + attrEscape(fixedBudget !== undefined ? fixedBudget : '') + '" onchange="updateBudget(' + "'" + 'Fixed Expenses' + "'" + ',this.value)"></td>';
    html += '</tr>';

    html += '</tbody>';
    html += '</table>';

    html += '<div class="grand-total">';
    html += '<div class="grand-total-label">Total Expenses</div>';
    html += '<div class="grand-total-value">' + formatMoney(grandTotal) + '</div>';
    html += '</div>';

    html += '<div class="ps-note">P.S. The evaluation of expenses is based from the 26th of each month.</div>';
    html += '</div>';
    return html;
  } catch (e) {
    console.error('renderSummaryTable error:', e);
    return '<div class="section-card" style="padding:16px;color:#ff6b6b;">Error loading Summary</div>';
  }
}

// --- NUCLEAR RESET ---
function nuclearReset() {
  if (!confirm('This will reset ALL data to defaults. Are you sure?')) return;
  try {
    var s = getStorage();
    if (s) s.removeItem(STORAGE_KEY);
  } catch (e) {}
  memoryStore = null;
  appData = createDefaultData();
  currentMonth = 'May';
  saveData();
  renderMonthBar();
  renderMonth();
  showToast('Data reset to defaults');
}

// ============================================================
// DATA OPERATIONS
// ============================================================
function updateSalary(source, value) {
  try {
    if (appData.months[currentMonth] && appData.months[currentMonth].salary) {
      appData.months[currentMonth].salary[source] = value;
    }
    saveData();
    renderMonth();
  } catch (e) { console.error(e); }
}

function updateBalance(type, bank, value) {
  try {
    var month = appData.months[currentMonth];
    if (month && month.balances && month.balances[type]) {
      month.balances[type][bank] = value;
    }
    saveData();
    renderMonth();
  } catch (e) { console.error(e); }
}

function updateEntry(cat, index, field, value) {
  try {
    var month = appData.months[currentMonth];
    if (!month || !month.expenditures || !month.expenditures[cat]) return;
    if (field === 'date') {
      month.expenditures[cat][index].date = dateToSerial(value);
    } else {
      month.expenditures[cat][index][field] = value;
    }
    saveData();
    renderMonth();
  } catch (e) { console.error(e); }
}

function addEntry(cat) {
  try {
    var month = appData.months[currentMonth];
    if (!month.expenditures) month.expenditures = {};
    if (!month.expenditures[cat]) month.expenditures[cat] = [];
    month.expenditures[cat].push({ desc: '', date: '', amount: '' });
    saveData();
    renderMonth();
  } catch (e) { console.error(e); }
}

function deleteEntry(cat, index) {
  try {
    var month = appData.months[currentMonth];
    if (month && month.expenditures && month.expenditures[cat]) {
      month.expenditures[cat].splice(index, 1);
    }
    saveData();
    renderMonth();
  } catch (e) { console.error(e); }
}

// ============================================================
// INLINE EDITING - CATEGORIES
// ============================================================
function renameCategory(index, newName) {
  newName = (newName || '').trim();
  if (!newName) {
    showToast('Category name cannot be empty');
    renderMonth();
    return;
  }
  var config = appData.config;
  var oldName = config.categories[index];
  if (oldName === newName) return;

  if (config.categories.indexOf(newName) !== -1 && config.categories.indexOf(newName) !== index) {
    showToast('Category already exists');
    renderMonth();
    return;
  }

  config.categories[index] = newName;
  if (config.budgets[oldName] !== undefined) {
    config.budgets[newName] = config.budgets[oldName];
    delete config.budgets[oldName];
  }

  for (var m in appData.months) {
    var month = appData.months[m];
    if (!month.expenditures) month.expenditures = {};
    if (month.expenditures[oldName]) {
      month.expenditures[newName] = month.expenditures[oldName];
      delete month.expenditures[oldName];
    }
    if (month.budgets && month.budgets[oldName] !== undefined) {
      month.budgets[newName] = month.budgets[oldName];
      delete month.budgets[oldName];
    }
  }

  saveData();
  renderMonth();
  showToast('Category renamed');
}

function removeCategory(index) {
  var config = appData.config;
  if (config.categories.length <= 1) {
    showToast('Need at least one category');
    return;
  }
  var cat = config.categories[index];
  if (!confirm('Delete category "' + cat + '" and all its entries?')) return;

  config.categories.splice(index, 1);
  delete config.budgets[cat];

  for (var m in appData.months) {
    var month = appData.months[m];
    if (month.expenditures) delete month.expenditures[cat];
    if (month.budgets) delete month.budgets[cat];
  }

  saveData();
  renderMonth();
  showToast('Category removed');
}

function addCategoryFromUI() {
  var input = document.getElementById('newCategoryName');
  var name = (input && input.value || '').trim();
  if (!name) {
    showToast('Enter a category name');
    return;
  }
  var config = appData.config;
  if (config.categories.indexOf(name) !== -1) {
    showToast('Category already exists');
    return;
  }

  config.categories.push(name);
  config.budgets[name] = 0;

  for (var m in appData.months) {
    var month = appData.months[m];
    if (!month.expenditures) month.expenditures = {};
    month.expenditures[name] = [];
    if (!month.budgets) month.budgets = {};
    if (month.budgets[name] === undefined) month.budgets[name] = 0;
  }

  saveData();
  renderMonth();
  showToast('Category added');
}

// ============================================================
// INLINE EDITING - FIXED EXPENSES
// ============================================================
function renameFixedExpense(index, newName) {
  newName = (newName || '').trim();
  if (!newName) {
    showToast('Name cannot be empty');
    renderMonth();
    return;
  }
  var cfg = appData.config;

// ============================================================
// EXCEL EXPORT - DASHBOARD STYLE
// ============================================================
function exportToExcel() {
  var wb = XLSX.utils.book_new();
  wb.Props = {
    Title: appData.config.appName || 'My Finances',
    Subject: 'Personal Bookkeeping',
    Author: 'My Finances App',
    CreatedDate: new Date()
  };

  var months = sortMonthsChronologically(Object.keys(appData.months));
  var config = appData.config;

  // --- BABY BLUE COLOR PALETTE ---
  var babyBlue = '89CFF0';
  var darkerBlue = '5DADE2';
  var lightBlue = 'B8E3F5';
  var paleBlue = 'E8F6FC';
  var white = 'FFFFFF';
  var offWhite = 'F8FAFC';
  var textDark = '1a1a2e';
  var textMed = '4a4a6a';
  var textLight = '8a8aaa';
  var borderLight = 'd0e8f5';
  var borderMed = 'a8d8f0';
  var green = '52c41a';
  var red = 'ff4d4f';

  // --- STYLE DEFINITIONS ---
  function makeStyle(opts) {
    var s = { font: { name: 'Inter', sz: 10, color: { rgb: textDark } } };
    if (opts.bold) s.font.bold = true;
    if (opts.sz) s.font.sz = opts.sz;
    if (opts.color) s.font.color = { rgb: opts.color };
    if (opts.fill) s.fill = { fgColor: { rgb: opts.fill }, patternType: 'solid' };
    if (opts.align) s.alignment = { horizontal: opts.align, vertical: 'center' };
    if (opts.border) {
      s.border = {};
      ['top','bottom','left','right'].forEach(function(k) {
        s.border[k] = { style: opts.borderStyle || 'thin', color: { rgb: opts.border } };
      });
    }
    if (opts.numFmt) s.numFmt = opts.numFmt;
    return s;
  }

  var S = {
    monthTitle: makeStyle({ bold: true, sz: 22, color: white, fill: babyBlue, align: 'center', border: babyBlue, borderStyle: 'medium' }),
    cardTitle: makeStyle({ bold: true, sz: 9, color: textLight, fill: paleBlue, align: 'center', border: borderLight }),
    cardValue: makeStyle({ bold: true, sz: 16, color: darkerBlue, fill: paleBlue, align: 'center', border: borderLight }),
    sectionHeader: makeStyle({ bold: true, sz: 12, color: white, fill: babyBlue, align: 'left', border: babyBlue, borderStyle: 'medium' }),
    tableHeader: makeStyle({ bold: true, sz: 10, color: textDark, fill: lightBlue, align: 'center', border: borderMed }),
    tableCell: makeStyle({ sz: 10, color: textDark, fill: white, align: 'left', border: borderLight }),
    tableCellRight: makeStyle({ sz: 10, color: textDark, fill: white, align: 'right', border: borderLight }),
    tableCellCenter: makeStyle({ sz: 10, color: textDark, fill: white, align: 'center', border: borderLight }),
    totalRow: makeStyle({ bold: true, sz: 10, color: textDark, fill: paleBlue, align: 'left', border: borderMed, borderStyle: 'medium' }),
    totalRowRight: makeStyle({ bold: true, sz: 10, color: textDark, fill: paleBlue, align: 'right', border: borderMed, borderStyle: 'medium' }),
    overBudget: makeStyle({ bold: true, sz: 10, color: red, fill: white, align: 'right', border: borderLight }),
    underBudget: makeStyle({ bold: true, sz: 10, color: green, fill: white, align: 'right', border: borderLight }),
    note: makeStyle({ sz: 9, color: textLight, fill: white, align: 'center', border: borderLight }),
    miniHeader: makeStyle({ bold: true, sz: 10, color: textMed, fill: offWhite, align: 'center', border: borderLight }),
    miniCell: makeStyle({ sz: 9, color: textDark, fill: white, align: 'center', border: borderLight }),
    miniCellRight: makeStyle({ sz: 9, color: textDark, fill: white, align: 'right', border: borderLight }),
    empty: makeStyle({ fill: white })
  };

  function applyStyle(ws, range, style) {
    for (var R = range.s.r; R <= range.e.r; ++R) {
      for (var C = range.s.c; C <= range.e.c; ++C) {
        var addr = XLSX.utils.encode_cell({ r: R, c: C });
        var cell = ws[addr];
        if (!cell) { cell = { v: '', t: 's' }; ws[addr] = cell; }
        cell.s = style;
      }
    }
  }

  function setColWidths(ws, widths) {
    ws['!cols'] = widths.map(function(w) { return { wch: w }; });
  }

  function fmtMoney(val) {
    if (val === '' || val === null || val === undefined || isNaN(val)) return '';
    return parseFloat(val).toLocaleString('en-ZA', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  // --- BUILD EACH MONTH SHEET ---
  for (var m = 0; m < months.length; m++) {
    var monthName = months[m];
    var month = appData.months[monthName];
    var ws_data = [];
    var merges = [];
    var row = 0;

    // ===== ROW 0: MONTH TITLE =====
    ws_data[row] = [monthName + ' 2026', '', '', '', '', '', '', '', '', '', '', ''];
    merges.push({ s: { r: row, c: 0 }, e: { r: row, c: 11 } });
    row++;

    // ===== ROW 1: EMPTY =====
    ws_data[row] = ['', '', '', '', '', '', '', '', '', '', '', ''];
    row++;

    // ===== ROW 2-3: SUMMARY CARDS =====
    var incomeTotal = 0;
    for (var s = 0; s < config.salarySources.length; s++) {
      incomeTotal += parseFloat(month.salary[config.salarySources[s]]) || 0;
    }

    var grandTotal = 0;
    var budgetTotal = 0;
    var categoryTotals = {};
    var categoryBudgets = {};
    for (var c = 0; c < config.categories.length; c++) {
      var cat = config.categories[c];
      var items = month.expenditures[cat];
      var catTotal = 0;
      for (var i = 0; i < items.length; i++) {
        catTotal += parseFloat(items[i].amount) || 0;
      }
      categoryTotals[cat] = catTotal;
      categoryBudgets[cat] = month.budgets[cat] || 0;
      grandTotal += catTotal;
      budgetTotal += month.budgets[cat] || 0;
    }
    var fixedItems = month.expenditures['Fixed Expenses'];
    var fixedTotal = 0;
    var fixedBudget = month.budgets['Fixed Expenses'] || 0;
    for (var f = 0; f < fixedItems.length; f++) {
      fixedTotal += parseFloat(fixedItems[f].amount) || 0;
    }
    grandTotal += fixedTotal;
    budgetTotal += fixedBudget;
    categoryTotals['Fixed Expenses'] = fixedTotal;
    categoryBudgets['Fixed Expenses'] = fixedBudget;

    var netIncome = incomeTotal - grandTotal;
    var leftToSpend = budgetTotal - grandTotal;
    if (leftToSpend < 0) leftToSpend = 0;
    var savingsRate = incomeTotal > 0 ? ((netIncome / incomeTotal) * 100).toFixed(1) : '0.0';

    var begTotal = 0, endTotal = 0;
    for (var b = 0; b < config.banks.length; b++) {
      var bank = config.banks[b];
      begTotal += parseFloat(month.balances.beginning[bank]) || 0;
      endTotal += parseFloat(month.balances.ending[bank]) || 0;
    }

    // Card labels
    ws_data[row] = ['Left to Spend', '', 'Total Expenses', '', 'Net Income', '', 'Savings Rate', '', 'Beg Balance', '', 'End Balance', ''];
    merges.push({ s: { r: row, c: 0 }, e: { r: row, c: 1 } });
    merges.push({ s: { r: row, c: 2 }, e: { r: row, c: 3 } });
    merges.push({ s: { r: row, c: 4 }, e: { r: row, c: 5 } });
    merges.push({ s: { r: row, c: 6 }, e: { r: row, c: 7 } });
    merges.push({ s: { r: row, c: 8 }, e: { r: row, c: 9 } });
    merges.push({ s: { r: row, c: 10 }, e: { r: row, c: 11 } });
    row++;

    // Card values
    ws_data[row] = [leftToSpend, '', grandTotal, '', netIncome, '', savingsRate + '%', '', begTotal, '', endTotal, ''];
    merges.push({ s: { r: row, c: 0 }, e: { r: row, c: 1 } });
    merges.push({ s: { r: row, c: 2 }, e: { r: row, c: 3 } });
    merges.push({ s: { r: row, c: 4 }, e: { r: row, c: 5 } });
    merges.push({ s: { r: row, c: 6 }, e: { r: row, c: 7 } });
    merges.push({ s: { r: row, c: 8 }, e: { r: row, c: 9 } });
    merges.push({ s: { r: row, c: 10 }, e: { r: row, c: 11 } });
    row++;

    // ===== ROW 4: EMPTY =====
    ws_data[row] = ['', '', '', '', '', '', '', '', '', '', '', ''];
    row++;

    // ===== ROW 5+: INCOME TREND MINI TABLE =====
    ws_data[row] = ['Income Trend', '', '', '', 'Balance Overview', '', '', '', 'Budget vs Actual', '', '', ''];
    merges.push({ s: { r: row, c: 0 }, e: { r: row, c: 3 } });
    merges.push({ s: { r: row, c: 4 }, e: { r: row, c: 7 } });
    merges.push({ s: { r: row, c: 8 }, e: { r: row, c: 11 } });
    row++;

    // Income Trend: Show all income sources with amounts
    ws_data[row] = ['Source', 'Amount', '% of Total', '', 'Bank', 'Beginning', 'Ending', 'Change', 'Category', 'Budget', 'Actual', 'Diff'];
    row++;

    var maxMiniRows = Math.max(config.salarySources.length, config.banks.length, config.categories.length + 1);
    for (var mr = 0; mr < maxMiniRows; mr++) {
      // Income Trend column
      var incSrc = config.salarySources[mr] || '';
      var incAmt = incSrc ? (parseFloat(month.salary[incSrc]) || 0) : '';
      var incPct = (incAmt && incomeTotal > 0) ? ((incAmt / incomeTotal) * 100).toFixed(1) + '%' : '';

      // Balance Overview column
      var balBank = config.banks[mr] || '';
      var balBeg = balBank ? (parseFloat(month.balances.beginning[balBank]) || 0) : '';
      var balEnd = balBank ? (parseFloat(month.balances.ending[balBank]) || 0) : '';
      var balChange = (balBeg !== '' && balEnd !== '') ? (balEnd - balBeg) : '';

      // Budget vs Actual column
      var bvaCat = config.categories[mr] || '';
      var bvaBud = bvaCat ? (month.budgets[bvaCat] || 0) : '';
      var bvaAct = bvaCat ? (categoryTotals[bvaCat] || 0) : '';
      var bvaDiff = (bvaBud !== '' && bvaAct !== '') ? (bvaBud - bvaAct) : '';
      if (mr === config.categories.length) {
        bvaCat = 'Fixed Expenses';
        bvaBud = fixedBudget;
        bvaAct = fixedTotal;
        bvaDiff = fixedBudget - fixedTotal;
      }

      ws_data[row] = [incSrc, incAmt, incPct, '', balBank, balBeg, balEnd, balChange, bvaCat, bvaBud, bvaAct, bvaDiff];
      row++;
    }

    // Mini table totals
    ws_data[row] = ['Total', incomeTotal, '100%', '', 'Total', begTotal, endTotal, endTotal - begTotal, 'Total', budgetTotal, grandTotal, budgetTotal - grandTotal];
    row++;

    // ===== ROW: EMPTY =====
    ws_data[row] = ['', '', '', '', '', '', '', '', '', '', '', ''];
    row++;

    // ===== DATA TABLES =====
    ws_data[row] = ['Income', '', '', '', 'Bills & Fixed', '', '', '', 'Expenses', '', '', ''];
    merges.push({ s: { r: row, c: 0 }, e: { r: row, c: 3 } });
    merges.push({ s: { r: row, c: 4 }, e: { r: row, c: 7 } });
    merges.push({ s: { r: row, c: 8 }, e: { r: row, c: 11 } });
    row++;

    ws_data[row] = ['Source', 'Payday', 'Amount', '', 'Name', 'Budget', 'Amount', '', 'Name', 'Budget', 'Amount', ''];
    row++;

    var maxRows = Math.max(config.salarySources.length, fixedItems.length, 0);
    for (var c2 = 0; c2 < config.categories.length; c2++) {
      maxRows = Math.max(maxRows, month.expenditures[config.categories[c2]].length);
    }
    maxRows = Math.max(maxRows, 5);

    for (var r2 = 0; r2 < maxRows; r2++) {
      var incomeSrc = config.salarySources[r2] || '';
      var incomeAmt = incomeSrc ? (month.salary[incomeSrc] || '') : '';
      var incomeDate = incomeSrc ? (monthName.substring(0, 3) + '-15') : '';

      var fixedName = fixedItems[r2] ? fixedItems[r2].name : '';
      var fixedAmt = fixedItems[r2] ? fixedItems[r2].amount : '';
      var fixedBud = fixedItems[r2] ? fixedBudget : '';

      var expCat = config.categories[r2] || '';
      var expItems = expCat ? month.expenditures[expCat] : [];
      var expName = expItems[0] ? (expItems[0].desc || expCat) : (expCat || '');
      var expAmt = expItems[0] ? expItems[0].amount : '';
      var expBud = expCat ? (month.budgets[expCat] || '') : '';

      ws_data[row] = [incomeSrc, incomeDate, incomeAmt, '', fixedName, fixedBud, fixedAmt, '', expName, expBud, expAmt, ''];
      row++;
    }

    ws_data[row] = ['Total', '', incomeTotal, '', 'Total', fixedBudget, fixedTotal, '', 'Total', '', grandTotal - fixedTotal, ''];
    row++;

    // ===== SAVINGS & DEBT SECTION =====
    ws_data[row] = ['', '', '', '', '', '', '', '', '', '', '', ''];
    row++;

    ws_data[row] = ['Savings', '', '', '', '', '', '', '', 'Debt / Other', '', '', ''];
    merges.push({ s: { r: row, c: 0 }, e: { r: row, c: 3 } });
    merges.push({ s: { r: row, c: 8 }, e: { r: row, c: 11 } });
    row++;

    ws_data[row] = ['Name', 'Budget', 'Amount', '', '', '', '', '', 'Name', 'Budget', 'Amount', ''];
    row++;

    for (var sr = 0; sr < 5; sr++) {
      ws_data[row] = ['', '', '', '', '', '', '', '', '', '', '', ''];
      row++;
    }

    // ===== NOTE =====
    ws_data[row] = ['P.S. The evaluation of expenses is based from the 26th of each month.', '', '', '', '', '', '', '', '', '', '', ''];
    merges.push({ s: { r: row, c: 0 }, e: { r: row, c: 11 } });
    row++;

    // Create worksheet
    var ws = XLSX.utils.aoa_to_sheet(ws_data);
    ws['!merges'] = merges;
    setColWidths(ws, [18, 12, 14, 2, 18, 12, 14, 12, 18, 12, 14, 12]);

    // Apply styles
    applyStyle(ws, { s: { r: 0, c: 0 }, e: { r: 0, c: 11 } }, S.monthTitle);
    ws['!rows'] = [{ hpt: 40 }];

    // Summary cards
    applyStyle(ws, { s: { r: 2, c: 0 }, e: { r: 2, c: 11 } }, S.cardTitle);
    applyStyle(ws, { s: { r: 3, c: 0 }, e: { r: 3, c: 11 } }, S.cardValue);

    // Mini table headers (row 5 = labels, row 6 = column headers)
    applyStyle(ws, { s: { r: 5, c: 0 }, e: { r: 5, c: 11 } }, makeStyle({ bold: true, sz: 11, color: textMed, fill: offWhite, align: 'center', border: borderLight }));
    applyStyle(ws, { s: { r: 6, c: 0 }, e: { r: 6, c: 11 } }, S.miniHeader);

    // Mini table data
    var miniStart = 7;
    var miniEnd = miniStart + maxMiniRows;
    for (var mr2 = miniStart; mr2 < miniEnd; mr2++) {
      for (var mc = 0; mc < 12; mc++) {
        if (mc === 3) continue;
        var mAddr = XLSX.utils.encode_cell({ r: mr2, c: mc });
        var mCell = ws[mAddr];
        if (!mCell) continue;
        var isNum = typeof mCell.v === 'number';
        var isPct = (mc === 2 || mc === 6 || mc === 11);
        if (isNum && !isPct) {
          mCell.s = S.miniCellRight;
          mCell.z = 'R#,##0.00';
        } else if (isNum && isPct) {
          mCell.s = S.miniCell;
        } else {
          mCell.s = S.miniCell;
        }
      }
    }

    // Mini table totals
    var miniTotalRow = miniEnd;
    for (var mtc = 0; mtc < 12; mtc++) {
      if (mtc === 3) continue;
      var mtAddr = XLSX.utils.encode_cell({ r: miniTotalRow, c: mtc });
      var mtCell = ws[mtAddr];
      if (!mtCell) continue;
      if (mtc === 0 || mtc === 4 || mtc === 8) {
        mtCell.s = S.totalRow;
      } else {
        mtCell.s = S.totalRowRight;
        if (typeof mtCell.v === 'number') mtCell.z = 'R#,##0.00';
      }
    }

    // Section headers for main tables
    var mainHeaderRow = miniTotalRow + 2;
    applyStyle(ws, { s: { r: mainHeaderRow, c: 0 }, e: { r: mainHeaderRow, c: 3 } }, S.sectionHeader);
    applyStyle(ws, { s: { r: mainHeaderRow, c: 4 }, e: { r: mainHeaderRow, c: 7 } }, S.sectionHeader);
    applyStyle(ws, { s: { r: mainHeaderRow, c: 8 }, e: { r: mainHeaderRow, c: 11 } }, S.sectionHeader);

    // Main table headers
    var mainTableHeaderRow = mainHeaderRow + 1;
    for (var hc = 0; hc < 12; hc++) {
      if (hc === 3 || hc === 7 || hc === 11) continue;
      var hAddr = XLSX.utils.encode_cell({ r: mainTableHeaderRow, c: hc });
      if (ws[hAddr]) ws[hAddr].s = S.tableHeader;
    }

    // Main data cells
    var mainDataStart = mainTableHeaderRow + 1;
    var mainDataEnd = mainDataStart + maxRows;
    for (var dr = mainDataStart; dr < mainDataEnd; dr++) {
      for (var dc = 0; dc < 12; dc++) {
        if (dc === 3 || dc === 7 || dc === 11) continue;
        var dAddr = XLSX.utils.encode_cell({ r: dr, c: dc });
        var dCell = ws[dAddr];
        if (!dCell) continue;
        var isNum = typeof dCell.v === 'number';
        var isLastCol = (dc === 2 || dc === 6 || dc === 10);
        if (isLastCol && isNum) {
          dCell.s = S.tableCellRight;
          dCell.z = 'R#,##0.00';
        } else if (isLastCol) {
          dCell.s = S.tableCellRight;
        } else if (dc === 1 || dc === 5 || dc === 9) {
          dCell.s = S.tableCellCenter;
        } else {
          dCell.s = S.tableCell;
        }
      }
    }

    // Main total rows
    var mainTotalRow = mainDataEnd;
    for (var tc = 0; tc < 12; tc++) {
      if (tc === 3 || tc === 7 || tc === 11) continue;
      var tAddr = XLSX.utils.encode_cell({ r: mainTotalRow, c: tc });
      var tCell = ws[tAddr];
      if (!tCell) continue;
      if (tc === 0 || tc === 4 || tc === 8) {
        tCell.s = S.totalRow;
      } else {
        tCell.s = S.totalRowRight;
        if (typeof tCell.v === 'number') tCell.z = 'R#,##0.00';
      }
    }

    // Savings & Debt section
    var savingsHeaderRow = mainTotalRow + 2;
    applyStyle(ws, { s: { r: savingsHeaderRow, c: 0 }, e: { r: savingsHeaderRow, c: 3 } }, S.sectionHeader);
    applyStyle(ws, { s: { r: savingsHeaderRow, c: 8 }, e: { r: savingsHeaderRow, c: 11 } }, S.sectionHeader);

    var savingsTableHeaderRow = savingsHeaderRow + 1;
    for (var shc = 0; shc < 12; shc++) {
      if (shc === 3 || shc === 7 || shc === 11) continue;
      if (shc < 3 || shc >= 8) {
        var shAddr = XLSX.utils.encode_cell({ r: savingsTableHeaderRow, c: shc });
        if (ws[shAddr]) ws[shAddr].s = S.tableHeader;
      }
    }

    // Savings data cells
    for (var sdr = savingsTableHeaderRow + 1; sdr < savingsTableHeaderRow + 6; sdr++) {
      for (var sdc = 0; sdc < 12; sdc++) {
        if (sdc === 3 || sdc === 7 || sdc === 11) continue;
        if (sdc < 3 || sdc >= 8) {
          var sdAddr = XLSX.utils.encode_cell({ r: sdr, c: sdc });
          var sdCell = ws[sdAddr];
          if (!sdCell) continue;
          if (sdc === 2 || sdc === 10) {
            sdCell.s = S.tableCellRight;
          } else if (sdc === 1 || sdc === 9) {
            sdCell.s = S.tableCellCenter;
          } else {
            sdCell.s = S.tableCell;
          }
        }
      }
    }

    // Note
    var noteRow = savingsTableHeaderRow + 6;
    applyStyle(ws, { s: { r: noteRow, c: 0 }, e: { r: noteRow, c: 11 } }, S.note);

    // Row heights
    for (var rh = 0; rh < ws_data.length; rh++) {
      if (!ws['!rows'][rh]) ws['!rows'][rh] = {};
      if (rh === 0) ws['!rows'][rh].hpt = 40;
      else if (rh === 3) ws['!rows'][rh].hpt = 32;
      else if (rh === 5) ws['!rows'][rh].hpt = 26;
      else ws['!rows'][rh].hpt = 20;
    }

    XLSX.utils.book_append_sheet(wb, ws, monthName);
  }

  // --- OVERVIEW SHEET ---
  var overviewData = [];
  var oRow = 0;

  overviewData[oRow] = [appData.config.appName || 'My Finances', '', '', '', '', '', '', '', '', '', '', ''];
  oRow++;
  overviewData[oRow] = ['Annual Overview 2026', '', '', '', '', '', '', '', '', '', '', ''];
  oRow++;
  overviewData[oRow] = ['', '', '', '', '', '', '', '', '', '', '', ''];
  oRow++;

  overviewData[oRow] = ['Month', 'Income', 'Expenses', 'Net', 'Savings %', 'Beg Balance', 'End Balance', '', '', '', '', ''];
  oRow++;

  var annualIncome = 0, annualExpenses = 0, annualNet = 0, annualBeg = 0, annualEnd = 0;

  for (var om = 0; om < months.length; om++) {
    var oMonthName = months[om];
    var oMonth = appData.months[oMonthName];

    var oIncome = 0;
    for (var os = 0; os < config.salarySources.length; os++) {
      oIncome += parseFloat(oMonth.salary[config.salarySources[os]]) || 0;
    }

    var oExpenses = 0;
    for (var oc = 0; oc < config.categories.length; oc++) {
      var oCat = config.categories[oc];
      var oItems = oMonth.expenditures[oCat];
      for (var oi = 0; oi < oItems.length; oi++) {
        oExpenses += parseFloat(oItems[oi].amount) || 0;
      }
    }
    var oFixed = oMonth.expenditures['Fixed Expenses'];
    for (var of = 0; of < oFixed.length; of++) {
      oExpenses += parseFloat(oFixed[of].amount) || 0;
    }

    var oNet = oIncome - oExpenses;
    var oSavings = oIncome > 0 ? ((oNet / oIncome) * 100).toFixed(1) : '0.0';

    var oBeg = 0, oEnd = 0;
    for (var ob = 0; ob < config.banks.length; ob++) {
      oBeg += parseFloat(oMonth.balances.beginning[config.banks[ob]]) || 0;
      oEnd += parseFloat(oMonth.balances.ending[config.banks[ob]]) || 0;
    }

    annualIncome += oIncome;
    annualExpenses += oExpenses;
    annualNet += oNet;
    annualBeg += oBeg;
    annualEnd += oEnd;

    overviewData[oRow] = [oMonthName, oIncome, oExpenses, oNet, oSavings + '%', oBeg, oEnd, '', '', '', '', ''];
    oRow++;
  }

  overviewData[oRow] = ['ANNUAL TOTAL', annualIncome, annualExpenses, annualNet, annualIncome > 0 ? ((annualNet / annualIncome) * 100).toFixed(1) + '%' : '0.0%', annualBeg, annualEnd, '', '', '', '', ''];
  oRow++;

  var wsOverview = XLSX.utils.aoa_to_sheet(overviewData);
  wsOverview['!merges'] = [
    { s: { r: 0, c: 0 }, e: { r: 0, c: 11 } },
    { s: { r: 1, c: 0 }, e: { r: 1, c: 11 } }
  ];
  setColWidths(wsOverview, [16, 14, 14, 14, 12, 14, 14, 2, 2, 2, 2, 2]);

  applyStyle(wsOverview, { s: { r: 0, c: 0 }, e: { r: 0, c: 11 } }, S.monthTitle);
  applyStyle(wsOverview, { s: { r: 1, c: 0 }, e: { r: 1, c: 11 } }, makeStyle({ bold: true, sz: 14, color: darkerBlue, fill: paleBlue, align: 'center', border: borderLight }));
  applyStyle(wsOverview, { s: { r: 3, c: 0 }, e: { r: 3, c: 11 } }, S.tableHeader);

  for (var or = 4; or < overviewData.length; or++) {
    for (var oc = 0; oc < 7; oc++) {
      var oAddr = XLSX.utils.encode_cell({ r: or, c: oc });
      var oCell = wsOverview[oAddr];
      if (!oCell) continue;
      if (typeof oCell.v === 'string' && oCell.v.indexOf('ANNUAL') === 0) {
        oCell.s = (oc === 0) ? S.totalRow : S.totalRowRight;
      } else {
        oCell.s = (oc === 0) ? S.tableCell : (oc >= 1 && oc <= 6) ? S.tableCellRight : S.tableCell;
      }
      if (oc >= 1 && oc <= 6 && typeof oCell.v === 'number') {
        oCell.z = 'R#,##0.00';
      }
    }
  }

  wsOverview['!rows'] = [{ hpt: 40 }, { hpt: 28 }];
  for (var orh = 2; orh < overviewData.length; orh++) {
    if (!wsOverview['!rows'][orh]) wsOverview['!rows'][orh] = {};
    wsOverview['!rows'][orh].hpt = 22;
  }

  XLSX.utils.book_append_sheet(wb, wsOverview, 'Overview');

  // --- CONFIG SHEET ---
  var configData = [];
  configData.push(['Configuration', '']);
  configData.push(['App Name', appData.config.appName || 'My Finances']);
  configData.push(['', '']);
  configData.push(['Banks', '']);
  for (var cb = 0; cb < config.banks.length; cb++) {
    configData.push(['', config.banks[cb]]);
  }
  configData.push(['', '']);
  configData.push(['Income Sources', '']);
  for (var cs = 0; cs < config.salarySources.length; cs++) {
    configData.push(['', config.salarySources[cs]]);
  }
  configData.push(['', '']);
  configData.push(['Categories', 'Default Budget']);
  for (var cc3 = 0; cc3 < config.categories.length; cc3++) {
    var ccat3 = config.categories[cc3];
    configData.push([ccat3, config.budgets[ccat3] || 0]);
  }
  configData.push(['Fixed Expenses', config.budgets['Fixed Expenses'] || 0]);
  configData.push(['', '']);
  configData.push(['Fixed Expense Details', 'Amount']);
  for (var cf = 0; cf < config.fixedExpenses.length; cf++) {
    configData.push([config.fixedExpenses[cf].name, config.fixedExpenses[cf].amount]);
  }

  var wsConfig = XLSX.utils.aoa_to_sheet(configData);
  var bankSectionStart = 3;
  var incomeSectionStart = bankSectionStart + config.banks.length + 3;
  var catSectionStart = incomeSectionStart + config.salarySources.length + 3;
  var fixedDetailStart = catSectionStart + config.categories.length + 3;

  wsConfig['!merges'] = [
    { s: { r: 0, c: 0 }, e: { r: 0, c: 1 } },
    { s: { r: bankSectionStart, c: 0 }, e: { r: bankSectionStart, c: 1 } },
    { s: { r: incomeSectionStart, c: 0 }, e: { r: incomeSectionStart, c: 1 } },
    { s: { r: catSectionStart, c: 0 }, e: { r: catSectionStart, c: 1 } },
    { s: { r: fixedDetailStart, c: 0 }, e: { r: fixedDetailStart, c: 1 } }
  ];
  setColWidths(wsConfig, [25, 20]);

  applyStyle(wsConfig, { s: { r: 0, c: 0 }, e: { r: 0, c: 1 } }, S.monthTitle);

  for (var cr2 = 0; cr2 < configData.length; cr2++) {
    for (var cc4 = 0; cc4 < 2; cc4++) {
      var cAddr2 = XLSX.utils.encode_cell({ r: cr2, c: cc4 });
      var cCell2 = wsConfig[cAddr2];
      if (!cCell2 || cr2 === 0) continue;

      var isHeader = (cr2 === bankSectionStart || cr2 === incomeSectionStart || cr2 === catSectionStart || cr2 === fixedDetailStart);
      if (isHeader) {
        cCell2.s = S.sectionHeader;
      } else if (cc4 === 0 && typeof cCell2.v === 'string' && cCell2.v !== '') {
        cCell2.s = S.tableCell;
      } else {
        cCell2.s = S.tableCellRight;
      }
    }
  }

  wsConfig['!rows'] = [{ hpt: 40 }];
  for (var crh = 1; crh < configData.length; crh++) {
    if (!wsConfig['!rows'][crh]) wsConfig['!rows'][crh] = {};
    wsConfig['!rows'][crh].hpt = 22;
  }

  XLSX.utils.book_append_sheet(wb, wsConfig, 'Configuration');

  // Write file
  var wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
  var blob = new Blob([wbout], { type: 'application/octet-stream' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = (appData.config.appName || 'My_Finances') + '_2026.xlsx';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  showToast('Excel exported successfully!');
}

// ============================================================
// BUDGET OPERATIONS
// ============================================================
function updateBudget(cat, value) {
  var amt = parseFloat(value) || 0;
  appData.months[currentMonth].budgets[cat] = amt;
  // Also update config so new months inherit the latest budget
  appData.config.budgets[cat] = amt;
  saveData();
  renderMonth();
  showToast('Budget updated');
}

// ============================================================
// APP INITIALIZATION
// ============================================================
initData();
renderMonthBar();
renderMonth();
</script>
</body>
</html>
